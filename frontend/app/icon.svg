<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" shape-rendering="crispEdges">
  <!-- 16x16 pixel art crystal ball - each rect = 1 pixel -->

  <!-- ball outline top -->
  <rect x="5" y="1" width="6" height="1" fill="#4c1d95"/>
  <rect x="3" y="2" width="2" height="1" fill="#4c1d95"/>
  <rect x="11" y="2" width="2" height="1" fill="#4c1d95"/>
  <rect x="2" y="3" width="1" height="1" fill="#4c1d95"/>
  <rect x="13" y="3" width="1" height="1" fill="#4c1d95"/>
  <rect x="1" y="4" width="1" height="2" fill="#4c1d95"/>
  <rect x="14" y="4" width="1" height="2" fill="#4c1d95"/>
  <rect x="1" y="6" width="1" height="2" fill="#4c1d95"/>
  <rect x="14" y="6" width="1" height="2" fill="#4c1d95"/>
  <rect x="2" y="8" width="1" height="1" fill="#4c1d95"/>
  <rect x="13" y="8" width="1" height="1" fill="#4c1d95"/>
  <rect x="3" y="9" width="2" height="1" fill="#4c1d95"/>
  <rect x="11" y="9" width="2" height="1" fill="#4c1d95"/>
  <rect x="5" y="10" width="6" height="1" fill="#4c1d95"/>

  <!-- ball fill -->
  <rect x="5" y="2" width="6" height="1" fill="#a78bfa"/>
  <rect x="3" y="3" width="10" height="1" fill="#a78bfa"/>
  <rect x="2" y="4" width="12" height="2" fill="#8b5cf6"/>
  <rect x="2" y="6" width="12" height="2" fill="#7c3aed"/>
  <rect x="3" y="8" width="10" height="1" fill="#6d28d9"/>
  <rect x="5" y="9" width="6" height="1" fill="#6d28d9"/>

  <!-- shine highlight (top-left) -->
  <rect x="5" y="3" width="2" height="1" fill="#ddd6fe"/>
  <rect x="4" y="4" width="1" height="1" fill="#ddd6fe"/>
  <rect x="5" y="4" width="2" height="1" fill="#ede9fe"/>
  <rect x="4" y="5" width="1" height="1" fill="#c4b5fd"/>

  <!-- sparkle inside ball -->
  <rect x="10" y="5" width="1" height="1" fill="#fbbf24"/>
  <rect x="7" y="7" width="1" height="1" fill="#fbbf24"/>
  <rect x="11" y="7" width="1" height="1" fill="#e9d5ff"/>

  <!-- stand/base -->
  <rect x="4" y="11" width="8" height="1" fill="#4c1d95"/>
  <rect x="3" y="12" width="10" height="1" fill="#581c87"/>
  <rect x="4" y="13" width="8" height="1" fill="#4c1d95"/>

  <!-- stars below -->
  <rect x="1" y="14" width="1" height="1" fill="#fbbf24"/>
  <rect x="7" y="15" width="1" height="1" fill="#fbbf24"/>
  <rect x="14" y="14" width="1" height="1" fill="#fbbf24"/>
</svg>
